name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Generate runtime proof artifact
        run: python scripts/exercise_runtime_scorecard.py --output artifacts/runtime-proof.json

      - name: Upload runtime proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: beaver-runtime-proof
          path: artifacts/runtime-proof.json
